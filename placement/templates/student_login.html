<!DOCTYPE html>
<html>
<head>
    <title>Student Login</title>
</head>
<body>

<h2>Student Login</h2>

<form method="POST">

    {% csrf_token %}

    <label>Register Number</label>
    <input type="text" name="reg_no">

    <br><br>

    <label>Password</label>
    <input type="password" name="password">

    <br><br>

    <button type="submit">
        Login
    </button>

</form>

<p style="color:red;">
    {{ message }}
</p>

<br>

<a href="{% url 'home' %}">
    Home
</a>

</body>
</html>
