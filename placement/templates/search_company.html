<!DOCTYPE html>
<html>
<head>
    <title>Search Company</title>
</head>
<body>

<h2>Search Company</h2>

<form method="POST">
    {% csrf_token %}
    <input type="text" name="keyword" placeholder="Enter Company Name">
    <button type="submit">Search</button>
</form>

<hr>

{% for company in companies %}
<p>
    {{ company.company_name }}
    -
    {{ company.role }}
    -
    {{ company.package }} LPA
</p>
{% endfor %}

<br>
<a href="{% url 'student_dashboard' %}">Back</a>

</body>
</html>
